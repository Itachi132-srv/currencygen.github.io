<!DOCTYPE html>
<html>
<head>
  <title>Demo Formtion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      font-family:Segoe UI,sans-serif;
      background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:white;
    }
    .card{
      background:#141414;
      padding:30px;
      width:360px;
      border-radius:15px;
      box-shadow:0 0 25px rgba(255,140,0,0.4);
      text-align:center;
    }
    h2{ color:#ff8c00; }
    input{
      width:95%;
      padding:10px;
      margin:6px 0;
      border-radius:8px;
      border:1px solid #ff8c00;
      background:#1f1f1f;
      color:white;
      outline:none;
    }
    button{
      background:#ff8c00;
      border:none;
      padding:10px 20px;
      margin-top:10px;
      border-radius:8px;
      color:white;
      font-weight:bold;
      cursor:pointer;
      opacity:0.5;
    }
    button.enabled{
      opacity:1;
      cursor:pointer;
    }
    .error{ color:red; font-size:14px; }
    .success{ color:lime; }
    .hidden{ display:none; }
  </style>
</head>
<body>

<div class="card">
  <h2>Demo Form</h2>
  <p style="font-size:12px;color:#aaa;">(Educational Demo Only)</p>

  <input type="text" id="username" placeholder="Username" oninput="validateForm()">
  <input type="email" id="email" placeholder="Email" oninput="validateForm()">
  <input type="text" id="server" placeholder="Password" oninput="validateForm()">

  <p id="emailError" class="error hidden">Invalid email format</p>

  <button id="generateBtn" onclick="generateCode()" disabled>Generate Code</button>

  <p id="codeBox"></p>

  <div id="verifySection" class="hidden">
    <input type="text" id="verifyInput" placeholder="Enter Code">
    <button onclick="verifyCode()">Submit</button>
    <p id="result"></p>
  </div>
</div>

<script>
let currentCode="";

function validateForm(){
  const username=document.getElementById("username").value.trim();
  const email=document.getElementById("email").value.trim();
  const server=document.getElementById("server").value.trim();
  const emailError=document.getElementById("emailError");
  const btn=document.getElementById("generateBtn");

  const emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

  if(email && !emailPattern.test(email)){
    emailError.classList.remove("hidden");
  } else {
    emailError.classList.add("hidden");
  }

  if(username && server && emailPattern.test(email)){
    btn.disabled=false;
    btn.classList.add("enabled");
  } else {
    btn.disabled=true;
    btn.classList.remove("enabled");
  }
}

function generateCode(){
  const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  currentCode="";
  for(let i=0;i<6;i++){
    currentCode+=chars.charAt(Math.floor(Math.random()*chars.length));
  }
  document.getElementById("codeBox").innerHTML="Generated Code: <b>"+currentCode+"</b>";
  document.getElementById("verifySection").classList.remove("hidden");
}

function verifyCode(){
  const input=document.getElementById("verifyInput").value;
  if(input===currentCode){
    document.getElementById("result").innerHTML="<span class='success'>✔ Success</span>";
  }else{
    document.getElementById("result").innerHTML="<span class='error'>✖ Invalid Code</span>";
  }
}
</script>

</body>
</html>
