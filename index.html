<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DetoxGPT</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f0f0f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chat-container{
    width:95%;
    max-width:600px;
    height:90vh;
    background:#111;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    border:1px solid #ff7b00;
}

.header{
    background:#ff7b00;
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
    font-size:18px;
}

.chat-box{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

.message{
    margin:8px 0;
    padding:10px 14px;
    border-radius:12px;
    max-width:80%;
    white-space:pre-line;
}

.user{
    background:#ff7b00;
    color:white;
    margin-left:auto;
}

.bot{
    background:#1e1e1e;
    color:#fff;
    border:1px solid #ff7b00;
}

.input-area{
    display:flex;
    padding:10px;
    background:#151515;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    outline:none;
    background:#222;
    color:white;
}

button{
    margin-left:8px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#ff7b00;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#ff9500;
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="header">🔥 DetoxGPT</div>
    <div class="chat-box" id="chat"></div>
    <div class="input-area">
        <input type="text" id="input" placeholder="Ask DetoxGPT anything...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>

let randomReplies = [
    "Hmm interesting 🤔",
    "Thora detail me batao bhai.",
    "Samajh gaya 😎",
    "Aur kuch poochna hai?"
];

function sendMessage(){
    let input = document.getElementById("input");
    let message = input.value.trim();
    if(message === "") return;

    addMessage(message,"user");
    input.value="";

    setTimeout(()=>{
        let reply = generateReply(message.toLowerCase());
        addMessage(reply,"bot");
    },500);
}

function addMessage(text,type){
    let chat = document.getElementById("chat");
    let msg = document.createElement("div");
    msg.classList.add("message",type);
    msg.innerText=text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function generateReply(msg){

    // Greeting
    if(msg.includes("hello") || msg.includes("hi"))
        return "Hello bhai 👋 Main DetoxGPT hoon. Batao kya help chahiye?";

    // Discord help
    if(msg.includes("discord") && msg.includes("channel")){
        return "Discord channel structure example 👇\n\n" +
        "📂 INFORMATION\n" +
        "├ #rules\n" +
        "├ #announcements\n\n" +
        "📂 GENERAL\n" +
        "├ #general-chat\n" +
        "├ #media\n\n" +
        "📂 VOICE\n" +
        "├ 🔊 General VC\n" +
        "├ 🔊 Gaming VC\n\n" +
        "Agar specific theme chahiye to batao (gaming, chill, trading etc).";
    }

    // HTML help
    if(msg.includes("html"))
        return "HTML structure banata hai website ka. Agar chaho to main tumhe full template bana ke de sakta hoon.";

    // Server names
    if(msg.includes("server name"))
        return "Yeh kuch names try karo:\n- Void Lounge\n- DarkNest\n- Orange Realm\n- Toxic Hub\n- Shadow Base";

    // Time
    if(msg.includes("time"))
        return "Abhi time hai: " + new Date().toLocaleTimeString();

    // Default smarter random
    return randomReplies[Math.floor(Math.random()*randomReplies.length)];
}

document.getElementById("input")
.addEventListener("keypress",function(e){
    if(e.key==="Enter") sendMessage();
});

</script>

</body>
</html>
