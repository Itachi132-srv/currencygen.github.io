<!DOCTYPE html>
<html>
<head>
  <title>Reward Generator</title>
  <style>
    body { font-family: Arial; text-align: center; background:#111; color:white; padding-top:50px; }
    button { padding:10px 20px; margin:10px; font-size:18px; cursor:pointer; }
    input { padding:8px; margin:5px; }
    .hidden { display:none; }
    .success { color:lime; font-size:22px; }
  </style>
</head>
<body>

<div id="page1">
  <h2>Select Reward Type</h2>
  <button onclick="nextPage('MoonCoin')">Owo</button>
  <button onclick="nextPage('StarToken')">LiteCoin</button>
</div>

<div id="page2" class="hidden">
  <h2 id="typeTitle"></h2>
  <input type="text" id="username" placeholder="Enter Username"><br>
  <input type="number" id="amount" placeholder="Enter Amount"><br>
  <button onclick="generateCode()">Generate Code</button>
  <p id="generatedCode"></p>
  <button id="copyBtn" class="hidden" onclick="copyCode()">Copy Code</button>
  <br><br>
  <button id="goNext" class="hidden" onclick="showVerify()">Next</button>
</div>

<div id="page3" class="hidden">
  <h2>Enter Code</h2>
  <input type="text" id="verifyInput" placeholder="Enter Code"><br>
  <button onclick="verifyCode()">Submit</button>
  <p id="result"></p>
</div>

<script>
let currentCode = "";

function nextPage(type){
  document.getElementById("page1").style.display="none";
  document.getElementById("page2").style.display="block";
  document.getElementById("typeTitle").innerText = type + " Generator";
}

function generateCode(){
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  currentCode="";
  for(let i=0;i<6;i++){
    currentCode += chars.charAt(Math.floor(Math.random()*chars.length));
  }
  document.getElementById("generatedCode").innerText = "Code: " + currentCode;
  document.getElementById("copyBtn").classList.remove("hidden");
  document.getElementById("goNext").classList.remove("hidden");
}

function copyCode(){
  navigator.clipboard.writeText(currentCode);
  alert("Code copied!");
}

function showVerify(){
  document.getElementById("page2").style.display="none";
  document.getElementById("page3").style.display="block";
}

function verifyCode(){
  const input = document.getElementById("verifyInput").value;
  if(input === currentCode){
    document.getElementById("result").innerHTML = "✅ <span class='success'>Send Successful</span>";
  } else {
    document.getElementById("result").innerHTML = "❌ Wrong Code";
  }
}
</script>

</body>
</html>
