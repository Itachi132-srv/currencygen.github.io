<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pro Cart Racing</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #111;
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
}

.ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 18px;
    font-weight: bold;
}

.controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 30px;
}

.btn {
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    color: white;
    user-select: none;
}
</style>
</head>
<body>

<div class="ui">Speed: <span id="speed">0</span></div>
<canvas id="game"></canvas>

<div class="controls">
    <div class="btn" id="left">⬅</div>
    <div class="btn" id="right">➡</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let roadWidth = canvas.width * 0.6;
let roadX = (canvas.width - roadWidth) / 2;

let cart = {
    x: canvas.width / 2 - 25,
    y: canvas.height - 120,
    width: 50,
    height: 90,
    speed: 0,
    maxSpeed: 12
};

let obstacles = [];
let score = 0;

function spawnObstacle() {
    let x = roadX + Math.random() * (roadWidth - 40);
    obstacles.push({
        x: x,
        y: -100,
        width: 40,
        height: 70
    });
}

function drawRoad() {
    ctx.fillStyle = "#444";
    ctx.fillRect(roadX, 0, roadWidth, canvas.height);

    ctx.strokeStyle = "white";
    ctx.setLineDash([20, 20]);
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(canvas.width/2, 0);
    ctx.lineTo(canvas.width/2, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);
}

function drawCart() {
    ctx.fillStyle = "red";
    ctx.fillRect(cart.x, cart.y, cart.width, cart.height);
}

function drawObstacles() {
    ctx.fillStyle = "yellow";
    obstacles.forEach(o => {
        ctx.fillRect(o.x, o.y, o.width, o.height);
    });
}

function update() {
    cart.speed = Math.min(cart.speed + 0.05, cart.maxSpeed);
    document.getElementById("speed").innerText = Math.floor(cart.speed * 10);

    obstacles.forEach(o => {
        o.y += cart.speed;
    });

    obstacles = obstacles.filter(o => o.y < canvas.height + 100);

    obstacles.forEach(o => {
        if (
            cart.x < o.x + o.width &&
            cart.x + cart.width > o.x &&
            cart.y < o.y + o.height &&
            cart.y + cart.height > o.y
        ) {
            alert("Game Over! Score: " + score);
            document.location.reload();
        }
    });

    score++;
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawRoad();
    drawCart();
    drawObstacles();
    update();
    requestAnimationFrame(gameLoop);
}

setInterval(spawnObstacle, 1500);

document.getElementById("left").addEventListener("touchstart", () => {
    cart.x -= 40;
});

document.getElementById("right").addEventListener("touchstart", () => {
    cart.x += 40;
});

gameLoop();
</script>

</body>
</html>
